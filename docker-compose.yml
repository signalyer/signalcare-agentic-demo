services:
  # ---------- L7 Stability: Relational Store ----------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sc-postgres
    environment:
      POSTGRES_USER: sc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
      POSTGRES_DB: signalcare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sc"]
      interval: 5s

  # ---------- L6 Adapter: Object Store ----------
  minio:
    image: minio/minio:latest
    container_name: sc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-scadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-devpassword}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s

  # ---------- L6 Adapter: Event Bus ----------
  nats:
    image: nats:2.10-alpine
    container_name: sc-nats
    command: "-js -m 8222"
    ports:
      - "4222:4222"
      - "8222:8222"

  # ---------- L6 Adapter: Secrets Vault ----------
  vault:
    image: hashicorp/vault:1.15
    container_name: sc-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_TOKEN:-devroot}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"

  # ---------- L6 Adapter: Identity Provider ----------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: sc-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8080:8080"

  # ---------- L6 Adapter: AI Model Gateway (local Fast tier) ----------
  ollama:
    image: ollama/ollama:latest
    container_name: sc-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # For GPU support, uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ---------- L0 Observability: OpenTelemetry Collector ----------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: sc-otel
    command: ["--config=/etc/otel-config.yaml"]
    volumes:
      - ./infra/observability/otel/config.yaml:/etc/otel-config.yaml
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
    depends_on:
      - loki
      - tempo
      - prometheus

  # ---------- L0 Observability: Logs ----------
  loki:
    image: grafana/loki:latest
    container_name: sc-loki
    ports:
      - "3100:3100"

  # ---------- L0 Observability: Traces ----------
  tempo:
    image: grafana/tempo:latest
    container_name: sc-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/observability/tempo/config.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"
      - "4327:4317"

  # ---------- L0 Observability: Metrics ----------
  prometheus:
    image: prom/prometheus:latest
    container_name: sc-prometheus
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # ---------- L0 Observability: Dashboards ----------
  grafana:
    image: grafana/grafana:latest
    container_name: sc-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-devpass}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/observability/grafana/dashboards:/etc/grafana/provisioning/dashboards

  # ---------- App: FastAPI Backend ----------
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: sc-app
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_started
      vault:
        condition: service_started
      otel-collector:
        condition: service_started
    volumes:
      - ./app:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ---------- App: Admin UI ----------
  admin-ui:
    build:
      context: ./admin_ui
      dockerfile: Dockerfile
    container_name: sc-admin
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - app

volumes:
  postgres_data:
  minio_data:
  ollama_data:
  grafana_data:
