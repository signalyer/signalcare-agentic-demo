[pytest]
# Canonical pytest config. Tests live at repo-root ./tests; app source is at ./app.
# `pythonpath = app` mirrors the Dockerfile's WORKDIR /app + `uvicorn main:app` — so
# tests can import `L6_adapters.ai_gateway` exactly as `main.py` does.
asyncio_mode = auto
testpaths = tests
pythonpath = app
markers =
    integration: live external calls (Ollama, OpenRouter). Auto-skips when providers unreachable.
